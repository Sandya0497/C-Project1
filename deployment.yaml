apiVersion: apps/v1
kind: Deployment
metadata:
  name: c-app
  labels:
    app: c-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: c-app
  template:
    metadata:
      labels:
        app: c-app
    spec:
      containers:
      - name: c-app
        image: 678632989999.dkr.ecr.ap-south-1.amazonaws.com/test-project:8
        ports:
        - containerPort: 8080
